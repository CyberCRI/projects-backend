{% extends 'admin/app_index.html' %}
{% block content %}

<div class="content border-bottom mb-2">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-md-auto d-flex flex-grow-1 align-items-center">
                <h1 class="h4 m-0 pr-3 mr-3 border-right"> Crisalid Apollo Importer </h1>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group field-name">
                <div class="row">
                    <label class="col-sm-3 text-left" for="id_name">
                        {{field.label}}
                    </label>
                    <div class="col-sm-12 field-name">
                        {{field}}
                        <div class="help-block text-red">
                            {{field.errors}}
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">
                Submit
            </button>
        </form>
    </div>
</div>

{% endblock %}
